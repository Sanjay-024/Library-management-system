<!DOCTYPE html>
<html>
<head>
  <title>Library Management System</title>
  <style>
    /* Body styling */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      background-color: black;
      color: white;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Container to hold content centered */
    .container {
      max-width: 800px;
      width: 90%;
      text-align: center;
      animation: glow 2s ease-in-out infinite alternate;
    }

    /* Glow animation */
    @keyframes glow {
      from {
        text-shadow: 0 0 5px #00BFFF;
      }
      to {
        text-shadow: 0 0 20px #0080FF;
      }
    }

    /* Navigation styling */
    nav a {
      margin-right: 15px;
      text-decoration: none;
      color: #00BFFF;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    nav a:hover {
      text-decoration: underline;
      color: #0080FF;
    }

    /* Flash messages in red with subtle glow */
    .flash {
      color: #FF5555;
      text-shadow: 0 0 5px #FF4444;
      list-style-type: none;
      margin: 10px 0;
    }

    /* Tables styled for readability on black background */
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      background-color: #111;
      color: white;
    }
    th, td {
      border: 1px solid #444;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #222;
    }

    /* Forms styling */
    form div {
      margin-bottom: 10px;
    }
    label {
      display: inline-block;
      width: 100px;
      font-weight: bold;
      text-align: right;
      margin-right: 5px;
    }
    input[type="text"], input[type="number"], select {
      width: 200px;
      padding: 5px;
      border-radius: 4px;
      border: 1px solid #444;
      background-color: #222;
      color: white;
    }
    input[type="submit"] {
      padding: 8px 16px;
      background-color: #00BFFF;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      color: black;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    input[type="submit"]:hover {
      background-color: #0080FF;
    }

    /* Navigation box with thick yellow border */
    .nav-box {
      border: 4px solid yellow;
      padding: 10px;
      margin: 20px auto;
      max-width: 800px;
      background-color: #222;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}
    <!-- Page content will be inserted here -->
    {% endblock %}
    <!-- Navigation inside nav-box container -->
    <div class="nav-box">
      <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('list_books') }}">Books</a>
        <a href="{{ url_for('list_users') }}">Users</a>
        <a href="{{ url_for('add_book') }}">Add Book</a>
        <a href="{{ url_for('add_user') }}">Add User</a>
        <a href="{{ url_for('borrow_book') }}">Borrow Book</a>
        <a href="{{ url_for('return_book') }}">Return Book</a>
        <a href="{{ url_for('search_book') }}">Search Book</a>
      </nav>
    </div>
  </div>
</body>
</html>
