{% extends 'base.html' %}

{% block content %}
<h2>Registered Users</h2>
{% if users %}
<table>
    <thead>
        <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Borrowed Books Count</th>
        </tr>
    </thead>
    <tbody>
    {% for user in users %}
        <tr>
            <td>{{ user.user_id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.borrowed_books|length }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
    <p>No users registered.</p>
{% endif %}
{% endblock %}
